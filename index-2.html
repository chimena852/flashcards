<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單字卡</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="單字卡">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6F4E37">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%236F4E37'/%3E%3Crect x='30' y='40' width='120' height='100' rx='14' fill='%238B6B4F' stroke='%23E8A24D' stroke-width='4'/%3E%3Ctext x='90' y='102' font-family='Georgia,serif' font-size='44' font-weight='700' text-anchor='middle' fill='%23FBF3E7'%3EAa%3C/text%3E%3C/svg%3E">

<style>
  :root{
    --paper: #6F4E37;
    --paper-raised: #8B6B4F;
    --ink: #FBF3E7;
    --ink-soft: #E0C9AC;
    --line: #A8825F;
    --amber: #E8A24D;
    --amber-soft: #5C4530;
    --sage: #A8C49A;
    --sage-soft: #4A5C40;
    --clay: #E8826E;
    --clay-soft: #5C3A30;
    --shadow: rgba(0,0,0,0.25);
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; }
  body{
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, 'PingFang TC', system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app{
    max-width: 880px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* ---------- Header ---------- */
  header.top{
    display:flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 16px;
  }
  .brand{
    font-family: Georgia, 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand .dot{ color: var(--amber); }
  .brand-avatar{
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--amber);
    flex-shrink: 0;
  }
  nav.tabs{
    display:flex;
    gap: 4px;
  }
  nav.tabs button{
    font-family: -apple-system, 'PingFang TC', system-ui, sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink-soft);
    background: transparent;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s ease;
  }
  nav.tabs button:hover{ background: var(--amber-soft); color: var(--ink); }
  nav.tabs button.active{ background: var(--ink); color: var(--paper); }

  /* ---------- Stats strip ---------- */
  .stats-strip{
    display:flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .stat-pill{
    flex: 1;
    min-width: 110px;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 16px;
  }
  .stat-pill .num{
    font-family: Georgia, 'Noto Serif TC', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.1;
  }
  .stat-pill .label{
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-top: 2px;
    letter-spacing: .02em;
  }
  .stat-pill.due .num{ color: var(--amber); }
  .stat-pill.mastered .num{ color: var(--sage); }

  /* ---------- Views ---------- */
  .view{ display:none; }
  .view.active{ display:block; }

  /* ---------- Empty state ---------- */
  .empty-state{
    text-align:center;
    padding: 70px 20px;
    color: var(--ink-soft);
  }
  .empty-state .icon{ font-size: 40px; margin-bottom: 12px; opacity: .6; }
  .empty-state h3{
    font-family:Georgia, 'Noto Serif TC', serif;
    color: var(--ink);
    font-size: 20px;
    margin: 0 0 6px;
  }
  .empty-state p{ margin: 0 0 18px; font-size: 14px; }

  /* ---------- Buttons ---------- */
  .btn{
    font-family:-apple-system, 'PingFang TC', system-ui, sans-serif;
    font-weight: 600;
    font-size: 14px;
    border: none;
    border-radius: 10px;
    padding: 11px 20px;
    cursor: pointer;
    transition: transform .1s ease, box-shadow .15s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{ background: var(--ink); color: var(--paper); }
  .btn-primary:hover{ box-shadow: 0 4px 14px var(--shadow); }
  .btn-ghost{ background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .btn-ghost:hover{ background: var(--paper-raised); }
  .btn-amber{ background: var(--amber); color: white; }
  .btn-sage{ background: var(--sage); color: white; }
  .btn-clay{ background: var(--clay); color: white; }
  .btn-block{ width: 100%; }
  .btn:disabled{ opacity: .4; cursor: not-allowed; }

  /* =================== REVIEW (Flashcard) =================== */
  .review-wrap{
    display:flex;
    flex-direction: column;
    align-items: center;
  }
  .deck-meta{
    display:flex;
    justify-content: space-between;
    width: 100%;
    max-width: 480px;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 14px;
  }
  .deck-meta b{ color: var(--ink); }

  .card-stack{
    position: relative;
    width: 100%;
    max-width: 480px;
    height: 290px;
    margin-bottom: 22px;
  }
  .stack-shadow{
    position:absolute;
    inset:0;
    border-radius: 18px;
    background: var(--paper-raised);
    border: 1px solid var(--line);
  }
  .stack-shadow.s1{ transform: translateY(8px) scale(0.98); opacity:.7; }
  .stack-shadow.s2{ transform: translateY(16px) scale(0.96); opacity:.4; }

  .flashcard{
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 18px;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    box-shadow: 0 10px 30px var(--shadow);
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 30px;
    perspective: 1200px;
  }
  .flashcard .face-inner{
    transition: opacity .18s ease;
  }
  .flashcard.flipped .front{ display:none; }
  .flashcard:not(.flipped) .back{ display:none; }

  .front .word{
    font-family:Georgia, 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 44px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .front .hint{
    margin-top: 14px;
    font-size: 12.5px;
    color: var(--ink-soft);
    letter-spacing: .03em;
  }
  .back .meaning{
    font-family:Georgia, 'Noto Serif TC', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--amber);
    margin-bottom: 10px;
  }
  .back .note{
    font-size: 14px;
    color: var(--ink-soft);
    max-width: 380px;
    margin: 0 auto;
  }
  .corner-tag{
    position:absolute;
    top: 16px;
    left: 18px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .speak-btn{
    position: absolute;
    top: 14px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--paper-raised);
    color: var(--amber);
    font-size: 16px;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: all .15s ease;
    z-index: 5;
  }
  .speak-btn:hover{ background: var(--amber-soft); border-color: var(--amber); }
  .speak-btn:active{ transform: scale(0.92); }
  .speak-btn.speaking{ background: var(--amber); color: white; }
  .speak-inline{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--paper-raised);
    color: var(--amber);
    font-size: 13px;
    cursor: pointer;
    vertical-align: middle;
    margin-left: 8px;
    transition: all .15s ease;
  }
  .speak-inline:hover{ background: var(--amber-soft); border-color: var(--amber); }

  .rate-row{
    display:flex;
    gap: 10px;
    width: 100%;
    max-width: 480px;
  }
  .rate-row button{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 3px;
    padding: 12px 8px;
  }
  .rate-row .key{ font-size: 11px; opacity: .85; }

  .flip-hint{
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--ink-soft);
  }

  /* =================== QUIZ =================== */
  .quiz-card{
    max-width: 520px;
    margin: 0 auto;
  }
  .quiz-progress{
    height: 5px;
    background: var(--line);
    border-radius: 4px;
    overflow:hidden;
    margin-bottom: 24px;
  }
  .quiz-progress .fill{
    height:100%;
    background: var(--amber);
    transition: width .25s ease;
  }
  .quiz-question{
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
    margin-bottom: 20px;
  }
  .quiz-mode-label{
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 10px;
  }
  .quiz-question .prompt{
    font-family:Georgia, 'Noto Serif TC', serif;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .quiz-question .sub{ font-size: 13px; color: var(--ink-soft); }

  .quiz-options{
    display:flex;
    flex-direction:column;
    gap: 10px;
  }
  .quiz-option{
    text-align:left;
    background: var(--paper-raised);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 15px;
    font-family:-apple-system, 'PingFang TC', system-ui, sans-serif;
    cursor:pointer;
    transition: all .12s ease;
  }
  .quiz-option:hover{ border-color: var(--amber); }
  .quiz-option.correct{ border-color: var(--sage); background: var(--sage-soft); }
  .quiz-option.wrong{ border-color: var(--clay); background: var(--clay-soft); }
  .quiz-option:disabled{ cursor: default; }

  .quiz-input-row{
    display:flex;
    gap: 10px;
  }
  .quiz-input-row input{
    flex:1;
    font-family:-apple-system, 'PingFang TC', system-ui, sans-serif;
    font-size: 16px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--paper-raised);
    color: var(--ink);
  }
  .quiz-input-row input:focus{ outline: 2px solid var(--amber); border-color: var(--amber); }
  .quiz-input-row input.correct{ border-color: var(--sage); background: var(--sage-soft); }
  .quiz-input-row input.wrong{ border-color: var(--clay); background: var(--clay-soft); }
  .quiz-feedback{
    margin-top: 14px;
    font-size: 14px;
    text-align: center;
    min-height: 20px;
  }
  .quiz-feedback.correct{ color: var(--sage); font-weight:600; }
  .quiz-feedback.wrong{ color: var(--clay); font-weight:600; }
  .quiz-footer{
    display:flex;
    justify-content: space-between;
    margin-top: 18px;
  }
  .quiz-summary{
    text-align:center;
    padding: 50px 20px;
  }
  .quiz-summary .score{
    font-family:Georgia, 'Noto Serif TC', serif;
    font-size: 56px;
    font-weight: 700;
    color: var(--amber);
  }
  .quiz-summary p{ color: var(--ink-soft); margin: 6px 0 24px; }

  /* =================== WORD LIST / MANAGE =================== */
  .manage-toolbar{
    display:flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .manage-toolbar input[type=text]{
    flex:1;
    font-family:-apple-system, 'PingFang TC', system-ui, sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--paper-raised);
  }
  .word-table{
    width: 100%;
    border-collapse: collapse;
  }
  .word-table thead th{
    text-align:left;
    font-size: 11.5px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 700;
    padding: 0 12px 10px;
    border-bottom: 1px solid var(--line);
  }
  .word-table tbody tr{
    border-bottom: 1px solid var(--line);
  }
  .word-table tbody tr:hover{ background: rgba(194,119,61,0.05); }
  .word-table td{
    padding: 13px 12px;
    font-size: 14.5px;
    vertical-align: middle;
  }
  .word-table .w{ font-family:Georgia, 'Noto Serif TC', serif; font-weight:600; font-size: 16px; }
  .word-table .meaning-cell{ color: var(--ink-soft); }
  .badge{
    display:inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .badge.new{ background: var(--amber-soft); color: var(--amber); }
  .badge.learning{ background: #FBE8D6; color: #A85A26; }
  .badge.mastered{ background: var(--sage-soft); color: var(--sage); }
  .row-actions{ display:flex; gap: 6px; justify-content:flex-end; }
  .icon-btn{
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 8px;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 14px;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{ background: var(--paper); }
  .icon-btn.danger:hover{ background: var(--clay-soft); border-color: var(--clay); }

  /* ---------- Modal ---------- */
  .modal-overlay{
    position: fixed; inset:0;
    background: rgba(31,41,55,0.35);
    display:none;
    align-items:center;
    justify-content:center;
    padding: 20px;
    z-index: 100;
  }
  .modal-overlay.active{ display:flex; }
  .modal{
    background: var(--paper-raised);
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    padding: 26px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h3{
    font-family:Georgia, 'Noto Serif TC', serif;
    margin: 0 0 18px;
    font-size: 20px;
  }
  .field{ margin-bottom: 14px; }
  .field label{
    display:block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 5px;
  }
  .field input, .field textarea{
    width: 100%;
    font-family:-apple-system, 'PingFang TC', system-ui, sans-serif;
    font-size: 14.5px;
    padding: 10px 12px;
    border-radius: 9px;
    border: 1px solid var(--line);
    background: var(--paper);
    resize: vertical;
  }
  .field input:focus, .field textarea:focus{ outline: 2px solid var(--amber); border-color: var(--amber); }
  .modal-actions{
    display:flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }

  .toast{
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    padding: 11px 22px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 600;
    opacity: 0;
    transition: all .25s ease;
    pointer-events: none;
    z-index: 200;
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px){
    nav.tabs button{ padding: 7px 10px; font-size: 12.5px; }
    .front .word{ font-size: 34px; }
    .word-table thead{ display:none; }
    .word-table tr{ display:flex; flex-direction:column; padding: 10px 0; }
    .word-table td{ padding: 3px 4px; }
    .row-actions{ justify-content:flex-start; margin-top: 6px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; animation: none !important; }
  }
</style>
</head>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ============ Pronunciation (Web Speech API, US English) ============ */
  const speechSupported = ('speechSynthesis' in window);
  let usVoice = null;

  function pickUsVoice(){
    if(!speechSupported) return;
    const voices = window.speechSynthesis.getVoices();
    if(!voices || voices.length === 0) return;
    // Prefer a clearly-labeled US English voice, fall back to any en-US, then any English voice
    usVoice =
      voices.find(v => v.lang === 'en-US' && /Google US English/i.test(v.name)) ||
      voices.find(v => v.lang === 'en-US' && /Samantha|Alex/i.test(v.name)) ||
      voices.find(v => v.lang === 'en-US') ||
      voices.find(v => v.lang && v.lang.startsWith('en')) ||
      null;
  }
  if(speechSupported){
    pickUsVoice();
    window.speechSynthesis.onvoiceschanged = pickUsVoice;
  }

  function speakWord(word, btnEl){
    if(!speechSupported){
      showToast('此瀏覽器不支援語音發音功能');
      return;
    }
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'en-US';
    if(usVoice) utter.voice = usVoice;
    utter.rate = 0.92;
    if(btnEl){
      utter.onstart = ()=> btnEl.classList.add('speaking');
      utter.onend = ()=> btnEl.classList.remove('speaking');
      utter.onerror = ()=> btnEl.classList.remove('speaking');
    }
    window.speechSynthesis.speak(utter);
  }

  /* ============ Storage ============ */
  const STORAGE_KEY = "vocab_words_v1";
  const STATS_KEY = "vocab_stats_v1";

  function loadWords(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    // seed example data on first run
    const now = Date.now();
    return [
      mkWord("ubiquitous", "無所不在的", "Smartphones are ubiquitous nowadays."),
      mkWord("ephemeral", "短暫的、稍縱即逝的", "Fame on the internet can be ephemeral."),
      mkWord("meticulous", "一絲不苟的、謹慎的", "She is meticulous about every detail."),
      mkWord("resilient", "有韌性的、能快速恢復的", "Children are often remarkably resilient.")
    ];
  }
  function mkWord(word, meaning, note){
    return {
      id: cryptoId(),
      word, meaning, note: note||"",
      box: 0,                 // leitner box 0-5
      dueAt: Date.now(),      // when next review is due
      reps: 0,
      correctStreak: 0,
      createdAt: Date.now()
    };
  }
  function cryptoId(){
    return 'w_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
  }
  function saveWords(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
  }
  function loadStats(){
    try{
      const raw = localStorage.getItem(STATS_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return { lastStudyDate: null, streak: 0 };
  }
  function saveStats(){
    localStorage.setItem(STATS_KEY, JSON.stringify(stats));
  }

  let words = loadWords();
  let stats = loadStats();
  saveWords();

  /* ============ Spaced repetition (Leitner-style intervals) ============ */
  // box -> interval in ms
  const BOX_INTERVALS = [
    0,                         // box0: immediately due (new/relearn)
    1000*60*60*8,              // box1: 8 hours
    1000*60*60*24,             // box2: 1 day
    1000*60*60*24*3,           // box3: 3 days
    1000*60*60*24*7,           // box4: 7 days
    1000*60*60*24*16           // box5: 16 days (mastered tier)
  ];
  const MAX_BOX = BOX_INTERVALS.length - 1;

  function isDue(w){ return w.dueAt <= Date.now(); }
  function getDueWords(){ return words.filter(isDue); }
  function statusOf(w){
    if(w.box >= 4) return 'mastered';
    if(w.box >= 1) return 'learning';
    return 'new';
  }

  function rateWord(w, grade){
    // grade: 'again' | 'hard' | 'good' | 'easy'
    w.reps++;
    if(grade === 'again'){
      w.box = 0;
      w.correctStreak = 0;
    } else if(grade === 'hard'){
      w.box = Math.max(0, w.box); // stay
      w.correctStreak++;
    } else if(grade === 'good'){
      w.box = Math.min(MAX_BOX, w.box + 1);
      w.correctStreak++;
    } else if(grade === 'easy'){
      w.box = Math.min(MAX_BOX, w.box + 2);
      w.correctStreak++;
    }
    w.dueAt = Date.now() + BOX_INTERVALS[w.box];
    saveWords();
    bumpStreak();
  }

  function bumpStreak(){
    const today = new Date().toDateString();
    if(stats.lastStudyDate === today) return;
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if(stats.lastStudyDate === yesterday){
      stats.streak = (stats.streak||0) + 1;
    } else {
      stats.streak = 1;
    }
    stats.lastStudyDate = today;
    saveStats();
  }

  /* ============ View switching ============ */
  const views = {
    review: document.getElementById('view-review'),
    quiz: document.getElementById('view-quiz'),
    manage: document.getElementById('view-manage')
  };
  document.querySelectorAll('nav.tabs button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      Object.values(views).forEach(v=>v.classList.remove('active'));
      views[btn.dataset.view].classList.add('active');
      if(btn.dataset.view === 'review') renderReview();
      if(btn.dataset.view === 'quiz') renderQuizSetup();
      if(btn.dataset.view === 'manage') renderManage();
    });
  });

  function refreshStats(){
    document.getElementById('stat-due').textContent = getDueWords().length;
    document.getElementById('stat-total').textContent = words.length;
    document.getElementById('stat-mastered').textContent = words.filter(w=>statusOf(w)==='mastered').length;
    document.getElementById('stat-streak').textContent = stats.streak || 0;
  }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(()=>t.classList.remove('show'), 1800);
  }

  /* ============ REVIEW (Flashcard) ============ */
  let reviewQueue = [];
  let currentCard = null;

  function renderReview(){
    refreshStats();
    reviewQueue = shuffle(getDueWords());
    showNextCard();
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function showNextCard(){
    const container = document.getElementById('review-content');
    if(reviewQueue.length === 0){
      currentCard = null;
      container.innerHTML = emptyReviewHTML();
      return;
    }
    currentCard = reviewQueue[0];
    container.innerHTML = flashcardHTML(currentCard, reviewQueue.length);
    bindFlashcardEvents();
  }

  function emptyReviewHTML(){
    if(words.length === 0){
      return `<div class="empty-state">
        <div class="icon">📇</div>
        <h3>還沒有單字</h3>
        <p>先到「單字庫」新增幾個單字，就可以開始複習了。</p>
        <button class="btn btn-primary" onclick="document.querySelector('[data-view=manage]').click()">前往新增單字</button>
      </div>`;
    }
    return `<div class="empty-state">
      <div class="icon">✅</div>
      <h3>今天的複習都完成了</h3>
      <p>系統會依照記憶曲線，安排這些單字下次該複習的時間。</p>
      <button class="btn btn-ghost" onclick="document.querySelector('[data-view=quiz]').click()">改做個測驗？</button>
    </div>`;
  }

  function flashcardHTML(w, remaining){
    return `
      <div class="review-wrap">
        <div class="deck-meta">
          <span>剩餘 <b>${remaining}</b> 張待複習</span>
          <span class="badge ${statusOf(w)}">${statusLabel(statusOf(w))}</span>
        </div>
        <div class="card-stack">
          <div class="stack-shadow s2"></div>
          <div class="stack-shadow s1"></div>
          <div class="flashcard" id="flashcard">
            <span class="corner-tag">單字卡</span>
            <button class="speak-btn" id="speak-btn" title="播放發音" aria-label="播放發音">🔊</button>
            <div class="face-inner front">
              <div class="word">${escapeHtml(w.word)}</div>
              <div class="hint">點擊卡片查看意思</div>
            </div>
            <div class="face-inner back">
              <div class="meaning">${escapeHtml(w.meaning)}</div>
              ${w.note ? `<div class="note">${escapeHtml(w.note)}</div>` : ''}
            </div>
          </div>
        </div>
        <div class="flip-hint" id="flip-hint">尚未翻面 — 先想想這個字的意思</div>
        <div class="rate-row" id="rate-row" style="visibility:hidden">
          <button class="btn btn-clay" data-grade="again">忘記了<span class="key">再看一次</span></button>
          <button class="btn btn-ghost" data-grade="hard">有點難<span class="key">縮短間隔</span></button>
          <button class="btn btn-amber" data-grade="good">記得<span class="key">正常間隔</span></button>
          <button class="btn btn-sage" data-grade="easy">很簡單<span class="key">拉長間隔</span></button>
        </div>
      </div>
    `;
  }

  function statusLabel(s){
    return s === 'mastered' ? '已掌握' : (s === 'learning' ? '學習中' : '新單字');
  }

  function bindFlashcardEvents(){
    const card = document.getElementById('flashcard');
    const rateRow = document.getElementById('rate-row');
    const flipHint = document.getElementById('flip-hint');
    const speakBtn = document.getElementById('speak-btn');
    card.addEventListener('click', ()=>{
      card.classList.toggle('flipped');
      if(card.classList.contains('flipped')){
        rateRow.style.visibility = 'visible';
        flipHint.textContent = '記得這個字嗎？';
      } else {
        rateRow.style.visibility = 'hidden';
        flipHint.textContent = '尚未翻面 — 先想想這個字的意思';
      }
    });
    speakBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      speakWord(currentCard.word, speakBtn);
    });
    rateRow.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const grade = btn.dataset.grade;
        rateWord(currentCard, grade);
        reviewQueue.shift();
        refreshStats();
        showNextCard();
      });
    });
    // auto-pronounce when a new card appears
    speakWord(currentCard.word, speakBtn);
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  /* ============ QUIZ ============ */
  let quizState = null;

  function renderQuizSetup(){
    refreshStats();
    const container = document.getElementById('quiz-content');
    if(words.length < 4){
      container.innerHTML = `<div class="empty-state">
        <div class="icon">📝</div>
        <h3>單字不足以開始測驗</h3>
        <p>選擇題需要至少 4 個單字來產生干擾選項，請先到「單字庫」新增更多單字。</p>
        <button class="btn btn-primary" onclick="document.querySelector('[data-view=manage]').click()">前往新增單字</button>
      </div>`;
      return;
    }
    container.innerHTML = `
      <div class="quiz-card">
        <div class="empty-state" style="padding: 40px 20px;">
          <div class="icon">🎯</div>
          <h3>選一個測驗模式</h3>
          <p>從你的 ${words.length} 個單字中隨機出題</p>
        </div>
        <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
          <button class="btn btn-primary" id="start-mc">選擇題</button>
          <button class="btn btn-ghost" id="start-fill">填空題</button>
        </div>
      </div>
    `;
    document.getElementById('start-mc').addEventListener('click', ()=>startQuiz('mc'));
    document.getElementById('start-fill').addEventListener('click', ()=>startQuiz('fill'));
  }

  function startQuiz(mode){
    const pool = shuffle(words).slice(0, Math.min(10, words.length));
    quizState = {
      mode,
      questions: pool,
      index: 0,
      score: 0,
      answered: false
    };
    renderQuizQuestion();
  }

  function renderQuizQuestion(){
    const container = document.getElementById('quiz-content');
    const { mode, questions, index, score } = quizState;

    if(index >= questions.length){
      container.innerHTML = `
        <div class="quiz-summary">
          <div class="score">${score} / ${questions.length}</div>
          <p>測驗完成！${score === questions.length ? '全對，太厲害了。' : '繼續加油，多練習幾次會更熟悉。'}</p>
          <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn btn-ghost" id="quiz-again">再測一次</button>
            <button class="btn btn-primary" id="quiz-review">改去複習單字卡</button>
          </div>
        </div>`;
      document.getElementById('quiz-again').addEventListener('click', renderQuizSetup);
      document.getElementById('quiz-review').addEventListener('click', ()=>document.querySelector('[data-view=review]').click());
      return;
    }

    const w = questions[index];
    const progressPct = Math.round((index / questions.length) * 100);

    if(mode === 'mc'){
      const distractors = shuffle(words.filter(x=>x.id!==w.id)).slice(0,3).map(x=>x.meaning);
      const options = shuffle([w.meaning, ...distractors]);
      container.innerHTML = `
        <div class="quiz-card">
          <div class="quiz-progress"><div class="fill" style="width:${progressPct}%"></div></div>
          <div class="quiz-question">
            <div class="quiz-mode-label">選擇題 · 第 ${index+1} / ${questions.length} 題</div>
            <div class="prompt">${escapeHtml(w.word)}<button class="speak-inline" data-speak="${escapeHtml(w.word)}" title="播放發音" aria-label="播放發音">🔊</button></div>
            <div class="sub">這個單字的意思是？</div>
          </div>
          <div class="quiz-options">
            ${options.map(opt=>`<button class="quiz-option" data-correct="${opt===w.meaning}">${escapeHtml(opt)}</button>`).join('')}
          </div>
          <div class="quiz-feedback" id="quiz-feedback"></div>
        </div>
      `;
      container.querySelectorAll('.quiz-option').forEach(btn=>{
        btn.addEventListener('click', ()=>handleMcAnswer(btn));
      });
      const mcSpeak = container.querySelector('[data-speak]');
      if(mcSpeak) mcSpeak.addEventListener('click', (e)=>{ e.stopPropagation(); speakWord(mcSpeak.dataset.speak, mcSpeak); });
    } else {
      container.innerHTML = `
        <div class="quiz-card">
          <div class="quiz-progress"><div class="fill" style="width:${progressPct}%"></div></div>
          <div class="quiz-question">
            <div class="quiz-mode-label">填空題 · 第 ${index+1} / ${questions.length} 題</div>
            <div class="prompt">${escapeHtml(w.meaning)}</div>
            <div class="sub">請輸入對應的英文單字</div>
          </div>
          <div class="quiz-input-row">
            <input type="text" id="fill-input" autocomplete="off" placeholder="輸入單字...">
            <button class="btn btn-primary" id="fill-submit">送出</button>
          </div>
          <div class="quiz-feedback" id="quiz-feedback"></div>
        </div>
      `;
      const input = document.getElementById('fill-input');
      input.focus();
      const submit = ()=>handleFillAnswer(w);
      document.getElementById('fill-submit').addEventListener('click', submit);
      input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
    }
  }

  function handleMcAnswer(btn){
    if(quizState.answered) return;
    quizState.answered = true;
    const correct = btn.dataset.correct === 'true';
    document.querySelectorAll('.quiz-option').forEach(o=>{
      o.disabled = true;
      if(o.dataset.correct === 'true') o.classList.add('correct');
      else if(o === btn) o.classList.add('wrong');
    });
    const fb = document.getElementById('quiz-feedback');
    if(correct){
      quizState.score++;
      fb.textContent = '答對了！';
      fb.className = 'quiz-feedback correct';
    } else {
      fb.textContent = '不對 — 正確答案已標示為綠色';
      fb.className = 'quiz-feedback wrong';
    }
    advanceAfterDelay();
  }

  function handleFillAnswer(w){
    if(quizState.answered) return;
    quizState.answered = true;
    const input = document.getElementById('fill-input');
    const userVal = input.value.trim().toLowerCase();
    const correct = userVal === w.word.trim().toLowerCase();
    input.disabled = true;
    input.classList.add(correct ? 'correct' : 'wrong');
    document.getElementById('fill-submit').disabled = true;
    const fb = document.getElementById('quiz-feedback');
    if(correct){
      quizState.score++;
      fb.innerHTML = '答對了！<button class="speak-inline" data-speak-fb="1" title="播放發音" aria-label="播放發音">🔊</button>';
      fb.className = 'quiz-feedback correct';
    } else {
      fb.innerHTML = `不對 — 正確答案是「${escapeHtml(w.word)}」<button class="speak-inline" data-speak-fb="1" title="播放發音" aria-label="播放發音">🔊</button>`;
      fb.className = 'quiz-feedback wrong';
    }
    const fbSpeak = fb.querySelector('[data-speak-fb]');
    if(fbSpeak) fbSpeak.addEventListener('click', ()=> speakWord(w.word, fbSpeak));
    advanceAfterDelay();
  }

  function advanceAfterDelay(){
    setTimeout(()=>{
      quizState.index++;
      quizState.answered = false;
      renderQuizQuestion();
    }, 1200);
  }

  /* ============ MANAGE (Word list CRUD) ============ */
  let searchTerm = '';
  document.getElementById('search-input').addEventListener('input', (e)=>{
    searchTerm = e.target.value.trim().toLowerCase();
    renderManageList();
  });

  function renderManage(){
    refreshStats();
    renderManageList();
  }

  function renderManageList(){
    const container = document.getElementById('manage-content');
    let list = words;
    if(searchTerm){
      list = list.filter(w => w.word.toLowerCase().includes(searchTerm) || w.meaning.toLowerCase().includes(searchTerm));
    }
    if(words.length === 0){
      container.innerHTML = `<div class="empty-state">
        <div class="icon">📚</div>
        <h3>單字庫是空的</h3>
        <p>點選右上方「新增單字」開始建立你的單字庫。</p>
      </div>`;
      return;
    }
    if(list.length === 0){
      container.innerHTML = `<div class="empty-state"><p>找不到符合「${escapeHtml(searchTerm)}」的單字</p></div>`;
      return;
    }
    list = list.slice().sort((a,b)=>b.createdAt-a.createdAt);
    container.innerHTML = `
      <table class="word-table">
        <thead><tr>
          <th>單字</th><th>意思</th><th>狀態</th><th>下次複習</th><th></th>
        </tr></thead>
        <tbody>
          ${list.map(w=>`
            <tr data-id="${w.id}">
              <td class="w">${escapeHtml(w.word)}<button class="speak-inline" data-speak="${escapeHtml(w.word)}" title="播放發音" aria-label="播放發音">🔊</button></td>
              <td class="meaning-cell">${escapeHtml(w.meaning)}</td>
              <td><span class="badge ${statusOf(w)}">${statusLabel(statusOf(w))}</span></td>
              <td>${formatDue(w.dueAt)}</td>
              <td>
                <div class="row-actions">
                  <button class="icon-btn" data-action="edit" title="編輯">✎</button>
                  <button class="icon-btn danger" data-action="delete" title="刪除">🗑</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    container.querySelectorAll('[data-action="edit"]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const id = e.target.closest('tr').dataset.id;
        openEditModal(id);
      });
    });
    container.querySelectorAll('[data-action="delete"]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const id = e.target.closest('tr').dataset.id;
        deleteWord(id);
      });
    });
    container.querySelectorAll('[data-speak]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        speakWord(btn.dataset.speak, btn);
      });
    });
  }

  function formatDue(ts){
    const now = Date.now();
    const diff = ts - now;
    if(diff <= 0) return '現在';
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    if(days >= 1) return `${days} 天後`;
    if(hours >= 1) return `${hours} 小時後`;
    return '1 小時內';
  }

  function deleteWord(id){
    const w = words.find(x=>x.id===id);
    if(!w) return;
    if(!confirm(`確定要刪除「${w.word}」嗎？`)) return;
    words = words.filter(x=>x.id!==id);
    saveWords();
    renderManageList();
    refreshStats();
    showToast('已刪除單字');
  }

  /* ============ Add/Edit Modal ============ */
  const modal = document.getElementById('word-modal');
  const modalTitle = document.getElementById('modal-title');
  const inputWord = document.getElementById('input-word');
  const inputMeaning = document.getElementById('input-meaning');
  const inputNote = document.getElementById('input-note');
  let editingId = null;

  document.getElementById('btn-add-word').addEventListener('click', ()=>{
    editingId = null;
    modalTitle.textContent = '新增單字';
    inputWord.value = '';
    inputMeaning.value = '';
    inputNote.value = '';
    modal.classList.add('active');
    setTimeout(()=>inputWord.focus(), 50);
  });

  function openEditModal(id){
    const w = words.find(x=>x.id===id);
    if(!w) return;
    editingId = id;
    modalTitle.textContent = '編輯單字';
    inputWord.value = w.word;
    inputMeaning.value = w.meaning;
    inputNote.value = w.note || '';
    modal.classList.add('active');
    setTimeout(()=>inputWord.focus(), 50);
  }

  document.getElementById('btn-cancel-word').addEventListener('click', ()=>{
    modal.classList.remove('active');
  });
  modal.addEventListener('click', (e)=>{
    if(e.target === modal) modal.classList.remove('active');
  });

  document.getElementById('btn-save-word').addEventListener('click', ()=>{
    const wordVal = inputWord.value.trim();
    const meaningVal = inputMeaning.value.trim();
    const noteVal = inputNote.value.trim();
    if(!wordVal || !meaningVal){
      showToast('請輸入單字和意思');
      return;
    }
    if(editingId){
      const w = words.find(x=>x.id===editingId);
      w.word = wordVal;
      w.meaning = meaningVal;
      w.note = noteVal;
      showToast('已更新單字');
    } else {
      words.push(mkWord(wordVal, meaningVal, noteVal));
      showToast('已新增單字');
    }
    saveWords();
    modal.classList.remove('active');
    renderManageList();
    refreshStats();
  });

  /* ============ Init ============ */
  refreshStats();
  renderReview();

})();
</script>
</body>
</html>
